services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: igem_education
    volumes:
      - ./backend/database/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: igem_education
      JWT_SECRET: change-this-in-production
      JWT_EXPIRES_IN: 7d
      SMTP_HOST: smtp.yeah.net
      SMTP_PORT: "465"
      SMTP_SECURE: "true"
      SMTP_USER: syneduglobal@yeah.net
      SMTP_PASS: ZFgPAAiyS4GL56hB
      SMTP_FROM: syneduglobal@yeah.net
      PORT: 3000
    volumes:
      - ./backend/database/uploads:/app/backend/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  seed:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: node backend/dist/seed.js
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_URL: http://backend:3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: igem_education

  libretranslate:
    image: libretranslate/libretranslate:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      LT_LOAD_ONLY: "zh,en"
      LT_QUEUE_LIMIT: "10"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
